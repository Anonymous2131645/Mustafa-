<title>🎬 Party Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<script type="module">

import{getDatabase,ref,set,onValue,push,onDisconnect,remove}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBIJL3lbYmpzPqUldkMwRwLQWZCGfW80L4",authDomain:"party-watch-ab8a7.firebaseapp.com",databaseURL:"https://party-watch-ab8a7-default-rtdb.europe-west1.firebasedatabase.app",projectId:"party-watch-ab8a7",storageBucket:"party-watch-ab8a7.firebasestorage.app",messagingSenderId:"689896096652",appId:"1:689896096652:web:bed12e1d0c7491ee950ca9"};

window._fbReady=true;document.dispatchEvent(new Event('fb-ready'));
</script>
<style>
:root{
  --bg:#050709;--s1:#0a0e14;--s2:#0f1520;--s3:#151d2a;--s4:#1a2535;
  --ac:#e63946;--ac2:#ff6b35;--gold:#ffd166;--green:#06d6a0;--blue:#4cc9f0;--purple:#7b5ea7;
  --tx:#f0f4ff;--t2:#7a8faa;--t3:#3d5070;--bd:#182030;
  --glow:rgba(230,57,70,.18);--gg:rgba(6,214,160,.15);
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;overflow:hidden;}
.splash-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(230,57,70,.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(76,201,240,.06) 0%,transparent 60%);pointer-events:none;}
.splash-inner{display:flex;flex-direction:column;align-items:center;gap:20px;z-index:1;width:100%;max-width:360px;padding:20px;}
.sp-logo-wrap{text-align:center;}
.sp-logo{font-size:3.2rem;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--ac2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.sp-tagline{color:var(--t2);font-size:.85rem;margin-top:4px;}
.sp-card{background:rgba(15,21,32,.9);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px;width:100%;display:flex;flex-direction:column;gap:12px;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,.5);}
.sp-inp{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);color:var(--tx);padding:12px 16px;border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:.95rem;text-align:center;outline:none;transition:.2s;width:100%;}
.sp-inp:focus{border-color:var(--ac);background:rgba(230,57,70,.06);}
.sp-av-row{display:flex;align-items:center;gap:12px;}
.sp-av-img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.1);cursor:pointer;transition:.2s;flex-shrink:0;}
.sp-av-img:hover{border-color:var(--ac);}
.sp-av-lbl{flex:1;background:rgba(255,255,255,.04);border:1.5px dashed rgba(255,255,255,.12);color:var(--t2);padding:10px;border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:.82rem;cursor:pointer;text-align:center;transition:.2s;}
.sp-av-lbl:hover{border-color:var(--ac);color:var(--ac);}
.sp-div{display:flex;align-items:center;gap:8px;color:var(--t3);font-size:.75rem;}
.sp-div::before,.sp-div::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07);}
.sp-btn{background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;padding:13px;border-radius:var(--r);font-size:.95rem;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.2s;width:100%;}
.sp-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--glow);}
.sp-btn:active{transform:translateY(0);}
.sp-row{display:flex;gap:8px;}
.sp-btn.ghost{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);color:var(--t2);flex:1;}
.sp-btn.ghost:hover{border-color:var(--ac);color:var(--ac);transform:none;box-shadow:none;}
.sp-join{display:none;flex-direction:column;gap:8px;background:rgba(255,255,255,.03);border-radius:var(--r);padding:12px;border:1px solid rgba(255,255,255,.06);}
.sp-join.show{display:flex;}
.sp-code{letter-spacing:5px!important;font-weight:900!important;font-size:1.15rem!important;text-transform:uppercase;}
.sp-err{color:var(--ac);font-size:.8rem;text-align:center;display:none;background:rgba(230,57,70,.1);border-radius:8px;padding:6px;}
.sp-note{font-size:.72rem;color:var(--t3);text-align:center;}

/* ══ APP ══ */
#app{display:none;flex-direction:column;height:100%;}

/* TOPBAR */
#topbar{background:var(--s1);border-bottom:1px solid var(--bd);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10;}
.tb-logo{font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.room-pill{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);color:var(--gold);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:.2s;}
.room-pill:hover{background:rgba(255,209,102,.2);}
.tb-r{display:flex;gap:6px;align-items:center;margin-right:auto;}
.tbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--t2);padding:6px 10px;border-radius:9px;font-size:.74rem;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:3px;white-space:nowrap;position:relative;}
.tbtn:hover{border-color:var(--ac);color:var(--ac);}
.tbtn.on{background:var(--ac);border-color:var(--ac);color:#fff;}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--ac);color:#fff;font-size:.58rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;border:2px solid var(--bg);padding:0 3px;}
.notif-badge.show{display:flex;}
.tb-av{width:30px;height:30px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--bd);transition:.2s;}
.tb-av:hover{border-color:var(--ac);}

/* WORKSPACE */
#ws{display:flex;flex:1;overflow:hidden;}

/* ══ SIDEBAR (Members + DMs) ══ */
#sidebar{width:220px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s;}
#sidebar.hide{width:0;overflow:hidden;}
.sb-section{padding:8px 10px 4px;font-size:.68rem;color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.member-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:8px;margin:1px 6px;transition:.15s;}
.member-item:hover{background:rgba(255,255,255,.05);}
.member-item.active{background:rgba(230,57,70,.12);}
.member-av{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;position:relative;}
.member-online{position:absolute;bottom:0;right:0;width:9px;height:9px;background:var(--green);border-radius:50%;border:2px solid var(--s1);}
.member-name{font-size:.82rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.member-you{font-size:.62rem;color:var(--ac);font-weight:700;}
.dm-unread{background:var(--ac);color:#fff;font-size:.62rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* ══ CHAT AREA ══ */
#chat-area{flex:1;display:flex;flex-direction:column;width:280px;min-width:240px;background:var(--s1);border-right:1px solid var(--bd);transition:width .3s,min-width .3s;flex-shrink:0;}
#chat-area.hide{width:0;min-width:0;overflow:hidden;}
.chat-header{padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.chat-title{font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:6px;}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 2s infinite;}
.chat-tabs{display:flex;gap:4px;padding:6px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.ct{padding:4px 10px;border-radius:7px;font-size:.75rem;cursor:pointer;color:var(--t2);transition:.15s;font-family:'Tajawal',sans-serif;border:none;background:none;}
.ct:hover{color:var(--tx);}
.ct.active{background:rgba(230,57,70,.15);color:var(--ac);font-weight:700;}
#msgs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}

/* messages */
.msg{display:flex;flex-direction:column;max-width:90%;animation:msgIn .2s ease;}
.msg.me{align-self:flex-end;align-items:flex-end;}
.msg.them{align-self:flex-start;align-items:flex-start;}
.msg-head{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.msg-av-sm{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.msg-name{font-size:.66rem;color:var(--t2);font-weight:600;}
.msg-bubble{padding:8px 11px;border-radius:12px;font-size:.84rem;line-height:1.45;word-break:break-word;position:relative;}
.msg.me .msg-bubble{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-bottom-left-radius:3px;}
.msg.them .msg-bubble{background:var(--s3);color:var(--tx);border-bottom-right-radius:3px;}
.msg-time{font-size:.62rem;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:4px;}
.msg-reactions{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.reaction-btn{background:var(--s3);border:1px solid var(--bd);border-radius:12px;padding:2px 6px;font-size:.78rem;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:2px;}
.reaction-btn:hover{border-color:var(--gold);transform:scale(1.1);}
.reaction-btn.mine{background:rgba(255,209,102,.15);border-color:rgba(255,209,102,.4);}
.reaction-count{font-size:.68rem;color:var(--t2);}
.add-reaction{background:none;border:1px dashed var(--bd);border-radius:12px;padding:2px 6px;font-size:.78rem;cursor:pointer;color:var(--t3);transition:.15s;}
.add-reaction:hover{border-color:var(--gold);color:var(--gold);}
.msg-img{max-width:190px;border-radius:10px;cursor:zoom-in;display:block;}
.msg-file{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border-radius:8px;padding:7px 10px;color:var(--tx);text-decoration:none;font-size:.8rem;max-width:190px;}
.msg-link{color:var(--blue);text-decoration:underline;word-break:break-all;}
.sysmsg{text-align:center;font-size:.68rem;color:var(--t3);background:rgba(255,255,255,.04);border-radius:20px;padding:3px 12px;align-self:center;}

/* EMOJI PICKER */
#emoji-picker{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:8px;display:none;flex-wrap:wrap;gap:3px;max-height:110px;overflow-y:auto;}
#emoji-picker span{font-size:1.15rem;cursor:pointer;border-radius:6px;padding:3px;transition:.1s;}
#emoji-picker span:hover{background:var(--s3);transform:scale(1.2);}

/* REACTION QUICK PICK */
.react-quick{position:absolute;bottom:calc(100% + 5px);right:0;background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:6px 8px;display:none;gap:4px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.react-quick.show{display:flex;}
.rq-btn{font-size:1.2rem;cursor:pointer;padding:2px;border-radius:6px;transition:.15s;}
.rq-btn:hover{background:var(--s3);transform:scale(1.2);}

/* CHAT INPUT */
.chat-ft{padding:8px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
#minput{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);color:var(--tx);padding:8px 11px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.84rem;resize:none;outline:none;width:100%;max-height:80px;transition:.2s;}
#minput:focus{border-color:var(--ac);}
.ca{display:flex;gap:5px;}
.cta{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--t2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.88rem;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.cta:hover{border-color:var(--ac);color:var(--ac);}
#sbtn{flex:1;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;height:30px;border-radius:8px;font-size:.84rem;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;transition:.15s;}
#sbtn:hover{opacity:.9;}
input[type=file]{display:none;}

/* ══ CENTER ══ */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#mode-bar{background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;flex-shrink:0;gap:0;padding:0 6px;}
.mbt{padding:9px 14px;font-size:.78rem;color:var(--t2);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:'Tajawal',sans-serif;transition:.15s;white-space:nowrap;}
.mbt:hover{color:var(--tx);}
.mbt.active{color:var(--tx);border-bottom-color:var(--ac);}
.mode-sep{width:1px;height:16px;background:var(--bd);margin:0 2px;flex-shrink:0;}
.remote-pill{background:rgba(255,209,102,.15);border:1px solid rgba(255,209,102,.3);color:var(--gold);font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;display:none;}
.remote-pill.show{display:inline;}
#grab-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--t2);font-size:.7rem;padding:3px 9px;border-radius:6px;cursor:pointer;white-space:nowrap;font-family:'Tajawal',sans-serif;transition:.15s;margin-right:auto;}
#grab-btn:hover{border-color:var(--gold);color:var(--gold);}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0;margin-left:6px;}
#conn-dot.live{background:var(--green);animation:blink 1.5s infinite;}

/* ══ PLAYER ══ */
#player-mode{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#vid-url-bar{background:var(--s1);border-bottom:1px solid var(--bd);padding:7px 10px;display:flex;gap:6px;align-items:center;flex-shrink:0;}
#vid-url{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);color:var(--tx);padding:7px 12px;border-radius:10px;font-size:.83rem;font-family:'Tajawal',sans-serif;outline:none;transition:.2s;direction:ltr;}
#vid-url:focus{border-color:var(--ac);}
#load-btn{background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;padding:7px 14px;border-radius:10px;font-size:.83rem;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;}
#load-btn:disabled{opacity:.5;cursor:not-allowed;}

/* SOURCES */
#sources-panel{background:var(--s2);border-bottom:1px solid var(--bd);display:none;flex-direction:column;flex-shrink:0;max-height:180px;overflow-y:auto;}
#sources-panel.show{display:flex;}
.src-panel-hd{padding:7px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);}
.src-panel-hd span{font-size:.74rem;color:var(--green);font-weight:700;}
.src-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.85rem;}
.src-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:.15s;}
.src-row:hover,.src-row.active-src{background:rgba(6,214,160,.07);}
.src-row.active-src{border-right:3px solid var(--green);}
.badge{font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0;text-transform:uppercase;}
.badge.mp4{background:var(--ac);color:#fff;}
.badge.m3u8{background:var(--blue);color:#000;}
.badge.mpd{background:var(--gold);color:#000;}
.badge.webm{background:var(--green);color:#000;}
.src-url-txt{flex:1;font-size:.74rem;color:var(--t2);direction:ltr;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.play-src-btn{background:var(--green);color:#000;border:none;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:5px;cursor:pointer;flex-shrink:0;}

/* VIDEO */
#vid-wrap{flex:1;position:relative;background:#000;overflow:hidden;}
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--t2);z-index:1;}
.empty-icon{font-size:3.5rem;opacity:.1;}
.empty-state p{font-size:.86rem;color:var(--t3);}
.empty-state .tip{font-size:.74rem;color:var(--t3);background:rgba(255,255,255,.04);border-radius:8px;padding:6px 12px;text-align:center;max-width:260px;line-height:1.6;}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;background:#000;}
#ifr-wrap{position:absolute;inset:0;display:none;}
#ifr-wrap iframe{width:100%;height:100%;border:none;}
#subov{position:absolute;bottom:65px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:6px 16px;border-radius:7px;font-size:1rem;max-width:82%;text-align:center;display:none;pointer-events:none;z-index:30;text-shadow:1px 1px 3px rgba(0,0,0,.8);}

/* VIDEO CONTROLS */
#vc{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.95));padding:12px 14px 10px;display:flex;flex-direction:column;gap:8px;opacity:0;transition:opacity .25s;z-index:20;}
#vid-wrap:hover #vc,#vid-wrap.show-ctrl #vc{opacity:1;}
#prog-wrap{position:relative;width:100%;cursor:pointer;padding:6px 0;}
#prog{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:4px;position:relative;transition:height .15s;}
#prog-wrap:hover #prog{height:6px;}
#prog-buf{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.18);border-radius:4px;pointer-events:none;}
#prog-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:4px;pointer-events:none;}
#prog-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:#fff;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 2px 6px rgba(0,0,0,.4);}
#prog-wrap:hover #prog-thumb{opacity:1;}
.vc-row{display:flex;align-items:center;gap:8px;}
.cb{background:none;border:none;color:#fff;font-size:1.05rem;cursor:pointer;padding:4px;opacity:.85;transition:.15s;flex-shrink:0;}
.cb:hover{opacity:1;transform:scale(1.1);}
#tdis{font-size:.72rem;color:rgba(255,255,255,.6);margin-right:auto;font-variant-numeric:tabular-nums;white-space:nowrap;}
#vol-wrap{display:flex;align-items:center;gap:5px;}
#vol-icon{font-size:.9rem;cursor:pointer;color:rgba(255,255,255,.7);}
#vol{width:60px;height:3px;accent-color:var(--ac);cursor:pointer;}
#qual-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.67rem;padding:2px 8px;border-radius:5px;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.15s;display:none;}
#qual-btn:hover{background:rgba(255,255,255,.2);}
#qual-menu{position:absolute;bottom:58px;left:14px;background:rgba(10,14,20,.95);border:1px solid var(--bd);border-radius:10px;padding:5px;display:none;flex-direction:column;gap:2px;z-index:50;min-width:110px;backdrop-filter:blur(10px);}
#qual-menu.show{display:flex;}
.qi{padding:6px 12px;font-size:.76rem;color:var(--t2);cursor:pointer;border-radius:7px;transition:.15s;}
.qi:hover{background:var(--s3);color:var(--tx);}
.qi.qactive{color:var(--green);font-weight:700;}

#vid-bottom{background:var(--s1);border-top:1px solid var(--bd);padding:6px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.vbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--t2);padding:5px 10px;border-radius:8px;font-size:.74rem;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.vbtn:hover{border-color:var(--ac);color:var(--ac);}
#subname{font-size:.7rem;color:var(--t3);}

/* ══ BROWSER ══ */
#browser-mode{flex:1;display:none;flex-direction:column;overflow:hidden;}
#browser-ctrl{background:linear-gradient(135deg,rgba(230,57,70,.1),rgba(255,107,53,.05));border-bottom:1px solid rgba(230,57,70,.2);padding:6px 10px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;}
.bc-lbl{font-size:.72rem;color:var(--t2);white-space:nowrap;}
.bc-btn{border:none;padding:4px 12px;border-radius:7px;font-size:.76rem;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.15s;}
.bc-btn.play{background:var(--green);color:#000;}
.bc-btn.pause{background:var(--gold);color:#000;}
.bc-btn.seek{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--t2);}
.bc-btn.seek:hover{border-color:var(--blue);color:var(--blue);}
#bc-status{font-size:.7rem;color:var(--t3);margin-right:auto;}
#tabs-bar{background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 6px;min-height:34px;overflow-x:auto;flex-shrink:0;}
#tabs-bar::-webkit-scrollbar{height:2px;}
.tab{display:flex;align-items:center;gap:4px;padding:6px 11px;font-size:.76rem;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--tx);}
.tab.active{color:var(--tx);border-bottom-color:var(--ac);}
.tab-x{font-size:.6rem;color:var(--t3);padding:1px 4px;border-radius:4px;}
.tab-x:hover{background:var(--ac);color:#fff;}
.tab-plus{padding:5px 10px;font-size:1rem;color:var(--t3);cursor:pointer;}
.tab-plus:hover{color:var(--ac);}
#addr-bar{background:var(--s1);border-bottom:1px solid var(--bd);padding:6px 9px;display:flex;gap:5px;align-items:center;flex-shrink:0;}
.nb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--t2);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:.76rem;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.nb:hover{border-color:var(--ac);color:var(--ac);}
#ubox{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);color:var(--tx);padding:5px 11px;border-radius:9px;font-size:.83rem;font-family:'Tajawal',sans-serif;outline:none;transition:.2s;direction:ltr;}
#ubox:focus{border-color:var(--ac);}
#scan-btn{background:linear-gradient(135deg,var(--green),#04a57a);border:none;color:#000;padding:5px 11px;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Tajawal',sans-serif;transition:.15s;}
#scan-btn:hover{opacity:.9;}
.ngo{background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;padding:5px 12px;border-radius:9px;font-size:.83rem;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;}
#bframes{flex:1;position:relative;overflow:hidden;}
.fslot{position:absolute;inset:0;display:none;}
.fslot.active{display:flex;flex-direction:column;}
.fslot iframe{flex:1;width:100%;border:none;background:#000;}
.home-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--t2);}
.home-icon{font-size:2.8rem;opacity:.1;}
.home-tip{font-size:.74rem;color:var(--t3);background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.15);border-radius:10px;padding:10px 14px;text-align:center;max-width:280px;line-height:1.6;}
.qls{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:340px;margin-top:4px;}
.ql{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--t2);padding:5px 11px;border-radius:9px;font-size:.73rem;cursor:pointer;transition:.15s;}
.ql:hover{border-color:var(--ac);color:var(--ac);}

/* ══ DM PANEL ══ */
#dm-panel{position:fixed;bottom:0;right:0;width:280px;background:var(--s1);border:1px solid var(--bd);border-radius:14px 14px 0 0;z-index:200;display:none;flex-direction:column;box-shadow:0 -8px 32px rgba(0,0,0,.5);}
#dm-panel.show{display:flex;}
.dm-header{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.dm-av{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.dm-name{font-weight:700;font-size:.88rem;flex:1;}
.dm-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:1rem;}
#dm-msgs{height:220px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
#dm-msgs::-webkit-scrollbar{width:3px;}
.dm-inp-row{padding:8px;border-top:1px solid var(--bd);display:flex;gap:6px;}
#dm-inp{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);color:var(--tx);padding:7px 10px;border-radius:9px;font-family:'Tajawal',sans-serif;font-size:.83rem;outline:none;}
#dm-inp:focus{border-color:var(--ac);}
#dm-send{background:var(--ac);border:none;color:#fff;padding:7px 12px;border-radius:9px;cursor:pointer;font-size:.83rem;font-family:'Tajawal',sans-serif;font-weight:700;}

/* ══ POPUPS ══ */
#msg-popup{position:fixed;top:56px;left:14px;z-index:500;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.mp{background:rgba(10,14,20,.92);border:1px solid var(--bd);border-radius:12px;padding:9px 12px;max-width:240px;opacity:0;transform:translateX(-20px);transition:opacity .3s,transform .3s;box-shadow:0 6px 20px rgba(0,0,0,.5);display:flex;align-items:center;gap:9px;backdrop-filter:blur(10px);}
.mp.show{opacity:1;transform:none;}
.mp-av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.mp-name{font-size:.7rem;font-weight:700;color:var(--ac);}
.mp-text{font-size:.77rem;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:165px;}

#lbox{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;align-items:center;justify-content:center;z-index:800;cursor:zoom-out;}
#lbox.show{display:flex;}
#lbox img{max-width:95%;max-height:95vh;border-radius:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(10,14,20,.95);border:1px solid var(--bd);color:var(--tx);padding:8px 18px;border-radius:40px;font-size:.83rem;z-index:900;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(10px);}
#toast.show{opacity:1;}
#snotif{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-weight:700;font-size:.8rem;padding:5px 16px;border-radius:30px;z-index:700;opacity:0;transition:opacity .3s;pointer-events:none;}
#snotif.show{opacity:1;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)scale(.96)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:none}}

@media(max-width:700px){
  #sidebar{display:none;}
  #chat-area{position:fixed;bottom:0;right:0;left:0;width:100%!important;min-width:unset;height:55vh;border-right:none;border-top:1px solid var(--bd);z-index:50;display:none;}
  #chat-area.mob{display:flex;}
  .tbtn span{display:none;}
  #dm-panel{width:100%;}
}
</style>

<script>
const SERVER='https://party-watch-server-production.up.railway.app';
const DEFAULT_ROOM='main';
const SAVE_KEY='pw_v3';
const DEFAULT_AV="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%230f1520'/%3E%3Ccircle cx='20' cy='16' r='7' fill='%233d5070'/%3E%3Cellipse cx='20' cy='34' rx='12' ry='8' fill='%233d5070'/%3E%3C/svg%3E";
const QUICK_REACTIONS=['❤️','😂','😮','😢','👏','🔥'];

let ME='',MY_AV='',ROOM='',IS_PRIVATE=false;
let db,_ref,_set,_onValue,_push,_onDisconnect,_remove;
let chatVisible=true,sidebarVisible=false,lastMsgTs=0,unread=0;
let hasRemote=false,remoteHolder='';
let ignoreSync=false,hlsObj=null,dashObj=null,isMuted=false;
let subtitleCues=[],subTimer=null;
let tabs=[],activeTab=null,tabCnt=0,allSources=[];
let dmTarget=null,dmTargetAv='';
let currentChatTab='main';
let membersData={};

// ── SAVE/LOAD ──
function saveUser(){localStorage.setItem(SAVE_KEY,JSON.stringify({name:ME,av:MY_AV}));}
function loadUser(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');}catch{return {};}}
function previewAv(inp){if(!inp.files||!inp.files[0])return;const r=new FileReader();r.onload=e=>{MY_AV=e.target.result;document.getElementById('sp-av').src=MY_AV;};r.readAsDataURL(inp.files[0]);}
window.onload=()=>{const s=loadUser();if(s.name)document.getElementById('sp-name').value=s.name;if(s.av){MY_AV=s.av;document.getElementById('sp-av').src=s.av;}};

// ── SPLASH ──
function toggleJoin(){document.getElementById('sp-join').classList.toggle('show');}
function validate(){const n=document.getElementById('sp-name').value.trim();if(!n){showErr('❌ أدخل اسمك');return null;}return n;}
function showErr(m){const e=document.getElementById('sp-err');e.textContent=m;e.style.display='block';}
function enterDefault(){const n=validate();if(!n)return;ME=n;ROOM=DEFAULT_ROOM;IS_PRIVATE=false;boot();}
function createPrivate(){const n=validate();if(!n)return;ME=n;ROOM='p-'+Math.random().toString(36).substring(2,8).toUpperCase();IS_PRIVATE=true;boot();}
function joinPrivate(){const n=validate();if(!n)return;const c=document.getElementById('sp-code').value.trim().toUpperCase();if(!c){showErr('❌ أدخل الكود');return;}ME=n;ROOM='p-'+c;IS_PRIVATE=true;boot();}

function boot(){
  saveUser();
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-av').src=MY_AV||DEFAULT_AV;
  document.getElementById('room-pill').textContent=IS_PRIVATE?'🔒 '+ROOM.replace('p-',''):'🏠 افتراضية';
  initEmoji();initTabs();
  if(window._fbReady)initFB();
  else document.addEventListener('fb-ready',initFB);
}

// ── FIREBASE ──
function initFB(){
  db=window._db;_ref=window._ref;_set=window._set;
  _onValue=window._onValue;_push=window._push;
  _onDisconnect=window._onDisconnect;_remove=window._remove;
  const R='rooms/'+ROOM;
  document.getElementById('conn-dot').classList.add('live');

  // Presence
  const ur=_ref(db,R+'/users/'+ME);
  _set(ur,{name:ME,av:MY_AV||'',ts:Date.now()});
  _onDisconnect(ur).remove();

  // Members
  _onValue(_ref(db,R+'/users'),snap=>{
    const u=snap.val()||{};
    membersData=u;
    document.getElementById('ch-on').textContent=Object.keys(u).length+' متصل';
    renderMembers(u);
  });

  // Remote
  _onValue(_ref(db,R+'/remote'),snap=>{
    const h=snap.val()||'';remoteHolder=h;hasRemote=(h===ME);
    document.getElementById('remote-pill').textContent=hasRemote?'🎮 الريموت عندك':'🎮 '+h;
    document.getElementById('remote-pill').classList.toggle('show',!!h);
    document.getElementById('grab-btn').style.display=hasRemote?'none':'inline';
  });

  // Browser URL sync
  _onValue(_ref(db,R+'/browserUrl'),snap=>{
    const url=snap.val();if(!url)return;
    if(document.getElementById('ubox').value!==url){
      document.getElementById('ubox').value=url;
      if(activeTab)loadBrowser(activeTab,url,false);
    }
  });

  // Browser commands
  _onValue(_ref(db,R+'/browserCmd'),snap=>{
    const cmd=snap.val();if(!cmd)return;
    const iframe=document.querySelector('#bframes .fslot.active iframe');
    if(!iframe)return;
    try{
      if(cmd.action==='play'){try{iframe.contentDocument.querySelectorAll('video').forEach(v=>v.play().catch(()=>{}));}catch(e){}}
      else if(cmd.action==='pause'){try{iframe.contentDocument.querySelectorAll('video').forEach(v=>v.pause());}catch(e){}}
      else if(cmd.action==='seek'){try{iframe.contentDocument.querySelectorAll('video').forEach(v=>{v.currentTime+=cmd.delta||0;});}catch(e){}}
      document.getElementById('bc-status').textContent=(cmd.action==='play'?'▶':cmd.action==='pause'?'⏸':(cmd.delta>0?'+':'')+cmd.delta+'s')+' — '+cmd.by;
      setTimeout(()=>document.getElementById('bc-status').textContent='',3000);
    }catch(e){}
  });

  // Video
  _onValue(_ref(db,R+'/video/url'),snap=>{
    const url=snap.val();
    if(url){document.getElementById('vid-url').value=url;renderVideo(url,null,false);}
    else clearVideoLocal();
  });
  _onValue(_ref(db,R+'/video/state'),snap=>{
    if(ignoreSync||hasRemote)return;
    const s=snap.val();if(!s)return;
    const v=document.getElementById('vid');if(!v.src||v.readyState<1)return;
    if(s==='play'&&v.paused){ignoreSync=true;v.play().catch(()=>{});setTimeout(()=>ignoreSync=false,600);}
    else if(s==='pause'&&!v.paused){ignoreSync=true;v.pause();setTimeout(()=>ignoreSync=false,600);}
  });
  _onValue(_ref(db,R+'/video/seek'),snap=>{
    if(ignoreSync||hasRemote)return;
    const t=snap.val();if(t==null)return;
    const v=document.getElementById('vid');if(!v.src||v.readyState<1)return;
    if(Math.abs(v.currentTime-t)>1.5){ignoreSync=true;v.currentTime=t;setTimeout(()=>ignoreSync=false,800);showSN('⏩ تزامن');}
  });

  // Main chat
  _onValue(_ref(db,R+'/chat'),snap=>{
    const data=snap.val();
    if(currentChatTab!=='main')return;
    renderChat(data,'msgs');
  });

  // DMs
  _onValue(_ref(db,R+'/dms'),snap=>{
    const all=snap.val()||{};
    // count unread DMs
    let dmUnread=0;
    Object.entries(all).forEach(([key,msgs])=>{
      if(key.includes(ME)){
        Object.values(msgs||{}).forEach(m=>{
          if(m.to===ME&&m.ts>lastMsgTs)dmUnread++;
        });
      }
    });
    // update DM panel if open
    if(dmTarget){
      const key=dmKey(ME,dmTarget);
      renderChat(all[key]||{},'dm-msgs',true);
    }
  });

  pushSys('👋 '+ME+' انضم');
}

function renderChat(data,containerId,isDM){
  const el=document.getElementById(containerId);if(!el)return;
  el.innerHTML='';
  if(!data)return;
  const arr=Object.entries(data).map(([k,v])=>({...v,_k:k})).sort((a,b)=>a.ts-b.ts);
  arr.forEach(m=>{
    if(m.type==='sys'){addSys(m.text,el);return;}
    const isNew=m.ts>lastMsgTs&&m.name!==ME;
    renderMsg(m,el,isDM);
    if(isNew&&!chatVisible&&!isDM){
      playMsgSound();showMsgPopup(m);
      unread++;
      const badge=document.getElementById('notif-badge');
      badge.textContent=unread;badge.classList.add('show');

function renderMsg(m,container,isDM){
  const mine=m.name===ME;
  const d=document.createElement('div');d.className='msg '+(mine?'me':'them');
  d.dataset.ts=m.ts;d.dataset.key=m._k||'';

  const head=document.createElement('div');head.className='msg-head';
  if(!mine){
    const img=document.createElement('img');img.className='msg-av-sm';img.src=m.av||DEFAULT_AV;head.appendChild(img);
    const nm=document.createElement('span');nm.className='msg-name';nm.textContent=m.name;head.appendChild(nm);
  }

  const bub=document.createElement('div');bub.className='msg-bubble';
  const tp=m.type||'text';
  if(tp==='text'){
    if(/(https?:\/\/[^\s]+)/.test(m.content))
      bub.innerHTML=m.content.replace(/(https?:\/\/[^\s]+)/g,'<a class="msg-link" href="$1" target="_blank" rel="noopener">$1</a>');
    else bub.textContent=m.content;
  }else if(tp==='image'){
    const img=document.createElement('img');img.src=m.content;img.className='msg-img';
    img.onclick=()=>openLB(m.content);bub.appendChild(img);
  }else if(tp==='file'){
    const pr=typeof m.content==='string'?JSON.parse(m.content):m.content;
    const a=document.createElement('a');a.href=pr.url;a.download=pr.name;a.className='msg-file';
    a.innerHTML='📎 '+pr.name;bub.appendChild(a);
  }

  const tm=document.createElement('div');tm.className='msg-time';
  tm.textContent=new Date(m.ts||Date.now()).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});

  // reactions
  if(!isDM&&m._k){
    const racts=document.createElement('div');racts.className='msg-reactions';
    // existing reactions
    if(m.reactions){
      Object.entries(m.reactions).forEach(([emoji,users])=>{
        const rb=document.createElement('button');rb.className='reaction-btn'+(users[ME]?' mine':'');
        rb.innerHTML=`${emoji}<span class="reaction-count">${Object.keys(users).length}</span>`;

    racts.appendChild(addR);
    d.appendChild(head);d.appendChild(bub);d.appendChild(racts);d.appendChild(tm);
  }else{
    d.appendChild(head);d.appendChild(bub);d.appendChild(tm);
  }

  container.appendChild(d);container.scrollTop=container.scrollHeight;
}

function renderVideo(url,type,broadcast){
  const t=type||getType(url);
  document.getElementById('empty-v').style.display='none';
  if(hlsObj){hlsObj.destroy();hlsObj=null;}
  if(dashObj){dashObj.reset();dashObj=null;}
  const vid=document.getElementById('vid');
  const iw=document.getElementById('ifr-wrap');

  if(t==='embed'){
    vid.style.display='none';vid.src='';
    iw.style.display='block';iw.innerHTML='';
    const ifr=document.createElement('iframe');ifr.src=url;
    ifr.allow='autoplay; fullscreen; picture-in-picture; encrypted-media';
    ifr.allowFullscreen=true;ifr.style.cssText='width:100%;height:100%;border:none;';
    iw.appendChild(ifr);
    if(broadcast)pushSys('🎬 فيلم خارجي');
    setMode('player');return;
  }

  iw.style.display='none';iw.innerHTML='';
  vid.style.display='block';
  document.getElementById('pb').textContent='▶';
  document.getElementById('qual-btn').style.display='none';

  const proxyUrl=SERVER+'/proxy?url='+encodeURIComponent(url)+'&ref='+encodeURIComponent(url);

  if(t==='m3u8'&&Hls.isSupported()){
    hlsObj=new Hls();
    hlsObj.loadSource(url);
    hlsObj.attachMedia(vid);
    hlsObj.on(Hls.Events.MANIFEST_PARSED,()=>{buildQualMenu();vid.play().catch(()=>{});});
    hlsObj.on(Hls.Events.ERROR,(e,d)=>{
      if(d.fatal&&d.type===Hls.ErrorTypes.NETWORK_ERROR){
        hlsObj.destroy();hlsObj=new Hls();hlsObj.loadSource(proxyUrl);hlsObj.attachMedia(vid);
        hlsObj.on(Hls.Events.MANIFEST_PARSED,()=>{vid.play().catch(()=>{});});
      }
    });
    document.getElementById('qual-btn').style.display='inline';
  }else if(t==='mpd'){
    dashObj=dashjs.MediaPlayer().create();dashObj.initialize(vid,url,true);
    document.getElementById('qual-btn').style.display='inline';
  }else{
    vid.src=url;
    vid.onerror=()=>{vid.onerror=null;vid.src=proxyUrl;vid.load();vid.play().catch(()=>{});};
    vid.load();vid.play().catch(()=>{});
  }
  if(broadcast)pushSys('🎬 فيلم جديد — تزامن كامل 🔄');
  setMode('player');
}

function clearVideoLocal(){if(hlsObj){hlsObj.destroy();hlsObj=null;}if(dashObj){dashObj.reset();dashObj=null;}const v=document.getElementById('vid');v.style.display='none';v.src='';document.getElementById('ifr-wrap').style.display='none';document.getElementById('ifr-wrap').innerHTML='';document.getElementById('empty-v').style.display='flex';document.getElementById('vid-url').value='';document.getElementById('subname').textContent='';subtitleCues=[];clearInterval(subTimer);document.getElementById('subov').style.display='none';document.getElementById('qual-btn').style.display='none';closeSources();allSources=[];}

function loadSub(inp){if(!inp.files[0])return;const file=inp.files[0];const r=new FileReader();r.onload=e=>{file.name.endsWith('.srt')?parseSRT(e.target.result):parseVTT(e.target.result);clearInterval(subTimer);const ov=document.getElementById('subov');ov.style.display='block';subTimer=setInterval(()=>{const v=document.getElementById('vid');const t=v.src?v.currentTime:0;const c=subtitleCues.find(c=>t>=c.s&&t<=c.e);ov.style.display=c?'block':'none';if(c)ov.textContent=c.t;},200);document.getElementById('subname').textContent='✅ '+file.name;toast('✅ تم تحميل الترجمة');};r.readAsText(file,'utf-8');inp.value='';}
function parseSRT(txt){subtitleCues=[];txt.trim().split(/\n\s*\n/).forEach(b=>{const ls=b.split('\n');if(ls.length<3)return;const m=ls[1].match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);if(!m)return;subtitleCues.push({s:srtT(m[1]),e:srtT(m[2]),t:ls.slice(2).join('\n').replace(/<[^>]+>/g,'')});});}
function parseVTT(txt){subtitleCues=[];txt.replace(/^WEBVTT[^\n]*\n/,'').trim().split(/\n\s*\n/).forEach(b=>{const ls=b.split('\n').filter(l=>l.trim()&&!/^\d+$/.test(l.trim()));if(ls.length<2)return;const m=ls[0].match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);if(!m)return;subtitleCues.push({s:srtT(m[1]),e:srtT(m[2]),t:ls.slice(1).join('\n')});});}
function srtT(s){const p=s.replace(',','.').split(':');return+p[0]*3600+ +p[1]*60+ +p[2];}

// ── BROWSER ──
const QS=[{n:'▶ عرب سيد',u:'https://m.reviewrate.net'},{n:'▶ شاهد',u:'https://shahid.mbc.net'},{n:'▶ Cimaclub',u:'https://cimaclub.baby'},{n:'▶ ASD',u:'https://asd.pics'},{n:'▶ Dailymotion',u:'https://www.dailymotion.com'},{n:'▶ OK Video',u:'https://ok.ru/video'}];
function homeHTML(){return`<div class="home-state"><div class="home-icon">🌐</div><div class="home-tip">💡 افتح موقع الفيلم ← شغّل الفيلم ← اضغط 🔍 استخرج<br>أو الصق رابط الصفحة مباشرة في المشغل</div><div class="qls">${QS.map(s=>`<div class="ql" onclick="qlLoad('${s.u}')">${s.n}</div>`).join('')}</div></div>`;}
function initTabs(){newTab();}
function newTab(url){const id=++tabCnt;tabs.push({id,url:url||'',title:url?urlTitle(url):'تبويب جديد'});const slot=document.createElement('div');slot.className='fslot';slot.id='fs-'+id;slot.innerHTML=homeHTML();document.getElementById('bframes').appendChild(slot);renderTabs();switchTab(id);if(url)loadBrowser(id,url,true);}
function qlLoad(url){document.getElementById('ubox').value=url;if(activeTab)loadBrowser(activeTab,url,true);else newTab(url);}
function switchTab(id){activeTab=id;document.querySelectorAll('.fslot').forEach(f=>f.classList.remove('active'));document.getElementById('fs-'+id)?.classList.add('active');const t=tabs.find(t=>t.id===id);document.getElementById('ubox').value=t?t.url:'';renderTabs();}
function closeTab(id,e){e.stopPropagation();document.getElementById('fs-'+id)?.remove();tabs=tabs.filter(t=>t.id!==id);if(!tabs.length)newTab();else switchTab(tabs[tabs.length-1].id);}
function renderTabs(){const bar=document.getElementById('tabs-bar');bar.innerHTML='';tabs.forEach(t=>{const d=document.createElement('div');d.className='tab'+(t.id===activeTab?' active':'');d.onclick=()=>switchTab(t.id);d.innerHTML=`<span>${t.title.substring(0,17)}</span><span class="tab-x" onclick="closeTab(${t.id},event)">✕</span>`;bar.appendChild(d);});const plus=document.createElement('div');plus.className='tab-plus';plus.textContent='+';plus.onclick=()=>newTab();bar.appendChild(plus);}
function loadBrowser(id,rawUrl,share){let url=rawUrl.trim();if(!url.startsWith('http'))url='https://'+url;const slot=document.getElementById('fs-'+id);if(!slot)return;const t=tabs.find(t=>t.id===id);if(t){t.url=url;t.title=urlTitle(url);}document.getElementById('ubox').value=url;renderTabs();slot.innerHTML='';const ifr=document.createElement('iframe');ifr.src=url;ifr.allow='autoplay; fullscreen; picture-in-picture; encrypted-media; clipboard-read; clipboard-write';ifr.allowFullscreen=true;ifr.setAttribute('sandbox','allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation allow-downloads');slot.appendChild(ifr);if(share)fbSet('browserUrl',url);}
function navShared(){let url=document.getElementById('ubox').value.trim();if(!url)return;if(!url.startsWith('http'))url='https://'+url;fbSet('browserUrl',url);if(activeTab)loadBrowser(activeTab,url,false);else newTab(url);}
async function scanPage(){const btn=document.getElementById('scan-btn');btn.textContent='⏳';const url=document.getElementById('ubox').value||'';if(!url.startsWith('http')){toast('افتح موقعاً أولاً');btn.textContent='🔍 استخرج';return;}const sources=await extractSources(url);btn.textContent='🔍 استخرج';if(!sources.length){toast('⚠️ لم يُكتشف رابط — شغّل الفيلم أولاً');return;}allSources=sources;showSources(sources);document.getElementById('vid-url').value=sources[0].url;fbSet('video/url',sources[0].url);renderVideo(sources[0].url,sources[0].type,true);setMode('player');}
function bsync(action,delta){fbSet('browserCmd',{action,delta:delta||0,by:ME,ts:Date.now()});try{const ifr=document.querySelector('#bframes .fslot.active iframe');if(action==='play')ifr.contentDocument.querySelectorAll('video').forEach(v=>v.play().catch(()=>{}));else if(action==='pause')ifr.contentDocument.querySelectorAll('video').forEach(v=>v.pause());else if(action==='seek')ifr.contentDocument.querySelectorAll('video').forEach(v=>{v.currentTime+=delta||0;});}catch(e){}showSN(action==='play'?'▶ تشغيل للكل':action==='pause'?'⏸ إيقاف للكل':(delta>0?'+':'')+delta+'s للكل');}
function getIF(){return document.querySelector('#fs-'+activeTab+' iframe');}
function goBack(){try{getIF().contentWindow.history.back();}catch(e){}}
function goFwd(){try{getIF().contentWindow.history.forward();}catch(e){}}
function reloadF(){const f=getIF();if(f){try{f.contentWindow.location.reload();}catch(e){f.src=f.src;}}}
function urlTitle(url){try{return new URL(url).hostname.replace('www.','');}catch{return url.substring(0,15);}}

// ── REMOTE ──
function grabRemote(){fbSet('remote',ME);toast('🎮 الريموت عندك الآن!');}

// ── MODE ──
function setMode(m){document.getElementById('mbt-p').classList.toggle('active',m==='player');document.getElementById('mbt-b').classList.toggle('active',m==='browser');document.getElementById('player-mode').style.display=m==='player'?'flex':'none';document.getElementById('browser-mode').style.display=m==='browser'?'flex':'none';}

// ── MISC ──
function toggleChat(){
  const c=document.getElementById('chat-area'),b=document.getElementById('ctog');
  window.innerWidth<=700?c.classList.toggle('mob'):c.classList.toggle('hide');
  chatVisible=window.innerWidth<=700?c.classList.contains('mob'):!c.classList.contains('hide');
  b.classList.toggle('on');
  if(chatVisible){unread=0;document.getElementById('notif-badge').classList.remove('show');}
}
function toggleSidebar(){
  const s=document.getElementById('sidebar');sidebarVisible=!sidebarVisible;
  s.classList.toggle('hide',!sidebarVisible);
  document.getElementById('members-btn').classList.toggle('on',sidebarVisible);
}
function copyRoomCode(){const c=IS_PRIVATE?ROOM.replace('p-',''):'الغرفة الافتراضية';navigator.clipboard.writeText(c).then(()=>toast('✅ تم نسخ: '+c));}
function copyInvite(){const c=IS_PRIVATE?ROOM.replace('p-',''):null;let txt='🎬 Party Watch\nالرابط: '+location.href+'\n';txt+=c?'كود الغرفة: '+c:' اضغط الغرفة الافتراضية';navigator.clipboard.writeText(txt).then(()=>toast('✅ تم نسخ الدعوة!'));}
function openLB(src){document.getElementById('lbimg').src=src;document.getElementById('lbox').classList.add('show');}
function closeLB(){document.getElementById('lbox').classList.remove('show');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function showSN(msg){const n=document.getElementById('snotif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2500);}

// Auto-hide controls
document.getElementById('vid-wrap').addEventListener('mousemove',()=>{const w=document.getElementById('vid-wrap');w.classList.add('show-ctrl');clearTimeout(w._t);w._t=setTimeout(()=>w.classList.remove('show-ctrl'),3000);});
document.getElementById('vid-wrap').addEventListener('touchstart',()=>{const w=document.getElementById('vid-wrap');w.classList.add('show-ctrl');clearTimeout(w._t);w._t=setTimeout(()=>w.classList.remove('show-ctrl'),3000);});
document.addEventListener('click',e=>{if(!e.target.closest('#qual-btn')&&!e.target.closest('#qual-menu'))document.getElementById('qual-menu').classList.remove('show');});

// Hide sidebar by default
document.getElementById('sidebar').classList.add('hide');
</script>
</body>
</html>
